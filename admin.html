<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙ Admin — Cuenta Regresiva Vacaciones</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-card">

    <!-- ===================================================
         LOGIN SECTION
         =================================================== -->
    <section id="login-section" class="admin-section">

      <div class="admin-header">
        <div class="admin-icon" aria-hidden="true">🔐</div>
        <h1>Panel de Administración</h1>
        <p>Acceso restringido</p>
      </div>

      <hr class="admin-divider" />

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="admin-password">Contraseña</label>
          <div class="input-with-toggle">
            <input
              type="password"
              id="admin-password"
              name="admin-password"
              placeholder="Ingresa la contraseña de admin"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" data-for="admin-password" aria-label="Mostrar/ocultar contraseña">👁</button>
          </div>
        </div>

        <div id="login-msg" class="msg" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn-primary">
          INGRESAR →
        </button>
      </form>

      <a href="index.html" class="back-link">← Volver a la cuenta regresiva</a>
    </section>

    <!-- ===================================================
         CONFIG SECTION (shown after login)
         =================================================== -->
    <section id="config-section" class="admin-section hidden">

      <div class="admin-header">
        <div class="admin-icon" aria-hidden="true">🗓</div>
        <h1>Configurar Fecha</h1>
        <p>Vacaciones Orlando</p>
      </div>

      <hr class="admin-divider" />

      <!-- Current date display -->
      <div class="current-date-display">
        Fecha actual:<br/>
        <strong id="current-date-label">—</strong>
      </div>

      <!-- Set date form -->
      <form id="config-form" novalidate>
        <div class="form-group">
          <label for="target-datetime">Nueva fecha y hora de inicio</label>
          <input
            type="datetime-local"
            id="target-datetime"
            name="target-datetime"
            required
          />
        </div>

        <div id="config-msg" class="msg" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn-primary">
          GUARDAR FECHA ✓
        </button>
      </form>

      <hr class="admin-divider" style="margin-top: 2rem;" />

      <!-- Change Password -->
      <div class="admin-header" style="margin-bottom: 1rem;">
        <p style="font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(232,244,255,0.5);">Cambiar contraseña de admin</p>
      </div>

      <form id="change-pw-form" novalidate>
        <div class="form-group">
          <label for="new-password">Nueva contraseña</label>
          <div class="input-with-toggle">
            <input
              type="password"
              id="new-password"
              name="new-password"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pw" data-for="new-password" aria-label="Mostrar/ocultar nueva contraseña">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <div class="input-with-toggle">
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Repite la contraseña"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pw" data-for="confirm-password" aria-label="Mostrar/ocultar confirmación">👁</button>
          </div>
        </div>

        <div id="changepw-msg" class="msg" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn-primary" style="margin-top: 0;">
          CAMBIAR CONTRASEÑA
        </button>
      </form>

      <!-- Logout -->
      <button id="logout-btn" type="button" class="btn-danger">
        CERRAR SESIÓN
      </button>

      <a href="index.html" class="back-link">← Volver a la cuenta regresiva</a>
    </section>

  </div><!-- /.admin-card -->

  <script src="js/admin.js"></script>
</body>
</html>
